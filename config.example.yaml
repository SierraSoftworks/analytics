# Example configuration for the analytics server.
# Copy to `config.yaml` and adjust. All sections are optional; defaults shown below.
# Secrets may be injected from the environment with `${{ env.VAR_NAME }}`.

web:
  # host:port the server listens on.
  address: "127.0.0.1:8085"
  # Externally visible base URL, used to build OIDC redirect URIs.
  base_url: "http://127.0.0.1:8085"
  # Trust X-Forwarded-* headers from an upstream reverse proxy.
  trust_proxy: false
  admin:
    # ACL filter expression evaluated for every protected (dashboard/API) request.
    # Default "false" denies everything. Examples:
    #   acl: "'analytics-admins' in claims.groups"
    #   acl: "claims.email == 'you@example.com'"
    acl: "true"
    # Omit this block entirely to disable authentication (local development).
    # oidc:
    #   endpoint: "https://idp.example.com"
    #   client_id: "analytics-dashboard"
    #   client_secret: "${{ env.OIDC_CLIENT_SECRET }}"
    #   scopes: ["profile", "email", "groups"]

storage:
  redb_path: "analytics.redb"
  parquet_dir: "parquet-store"
  hot_window: "48h"
  rollup_interval: "1h"
  retention: "365d"
  # Ceiling on auto-registered (unassigned) sources. Unknown reporting hostnames
  # register automatically, but this bounds how far a flood of rotated hostnames can
  # grow the source list. Events are stored regardless once the ceiling is reached.
  max_auto_sources: 10000

privacy:
  salt_rotation: "24h"
  honor_dnt: true

# Per-IP rate limiting. IP addresses are used only as transient in-memory keys and
# are never logged or stored. Each rule is a token bucket: `per_minute` is the
# sustained refill rate and `burst` the maximum momentary allowance.
ratelimit:
  enabled: true
  tracking:        # public /track/* beacons
    per_minute: 600
    burst: 200
  unauthenticated: # unauthenticated hits to protected endpoints
    per_minute: 60
    burst: 20

telemetry:
  service_name: "analytics"
  # sentry_dsn: "https://...@sentry.io/..."
  # environment: "production"
  # otlp_endpoint: "http://localhost:4317"
